name: claude-assistant

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: claude-assistant-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  trust-check:
    name: Evaluate author trust
    runs-on: ubuntu-latest
    outputs:
      is-trusted: ${{ steps.gate.outputs.is-trusted }}
    steps:
      - name: Checkout (for composite action)
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Evaluate author_association
        id: gate
        uses: ./.github/actions/claude-trust-gate
        with:
          author-association: ${{ github.event.comment.author_association }}

  respond:
    name: Respond to @claude mention
    needs: trust-check
    runs-on: ubuntu-latest
    if: >-
      contains(github.event.comment.body, '@claude') &&
      needs.trust-check.outputs.is-trusted == 'true'
    steps:
      - name: Write audit log
        if: always()
        run: |
          set -euo pipefail
          timestamp_utc="$(date -u +%FT%TZ)"
          {
            echo "## Claude assistant invocation"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Actor | ${{ github.event.comment.user.login }} |"
            echo "| Association | ${{ github.event.comment.author_association }} |"
            echo "| Comment URL | ${{ github.event.comment.html_url }} |"
            echo "| UTC timestamp | $timestamp_utc |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Invoke Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ github.event.comment.body }}
          claude_args: '--max-turns 5'
