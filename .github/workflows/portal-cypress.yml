# ============================================================
# Portal Cypress E2E tests — PLAN-021 Phase 1A CI integration.
# ============================================================
# Runs Cypress UI tests on PRs that touch portal files.
# Uses start-server-and-test to manage portal server lifecycle
# during test execution.
#
# Test isolation: each test run uses /tmp/cypress-state as the
# AUTONOMOUS_DEV_STATE_DIR to avoid conflicts with host state.
# ============================================================

name: portal-cypress

on:
  pull_request:
    paths:
      - 'plugins/autonomous-dev-portal/**'
      - '.github/workflows/portal-cypress.yml'

permissions:
  contents: read

concurrency:
  group: portal-cypress-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  cypress-e2e:
    name: Cypress E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install portal dependencies
        working-directory: plugins/autonomous-dev-portal
        run: bun install

      - name: Install Cypress dependencies
        working-directory: plugins/autonomous-dev-portal
        run: npm ci

      - name: Run Cypress tests
        working-directory: plugins/autonomous-dev-portal
        run: npm run cypress:ci

      - name: Upload Cypress artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-artifacts
          path: |
            plugins/autonomous-dev-portal/cypress/videos/
            plugins/autonomous-dev-portal/cypress/screenshots/
          retention-days: 7