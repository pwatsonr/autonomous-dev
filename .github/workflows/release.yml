# ============================================================
# Release Workflow -- Trust Model & Job Graph
# ============================================================
# This workflow runs on every `v*` tag push. It is the single point
# at which a tagged commit becomes a published GitHub Release. The
# pipeline grows over three specs:
#
#   SPEC-017-3-01 (this scaffold): verify-version + spend artifact.
#   SPEC-017-3-02:                 generate-changelog + create-release.
#   SPEC-017-3-04:                 verify-evals (release-side gate).
#
# The trust model differs from `claude-assistant.yml`: there is no
# comment author for a tag-push event. We rely on `contents: write`
# being scoped to maintainers via repo permissions; if a future
# scenario adds a workflow_dispatch path or non-trusted automation,
# revisit the trust assumption (see SPEC-017-3-02 §Trust-Gate Note).
#
# Concurrency is non-cancellable -- a partially-published release is
# worse than a duplicated run. The 10-minute job timeout keeps a stuck
# step from hanging the runner indefinitely.
#
# Operator runbooks (added by later specs):
#   docs/operators/release-smoke-tests.md
#   docs/operators/release-recovery.md
# ============================================================

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write       # required by softprops/action-gh-release in SPEC-017-3-02
  pull-requests: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # releases must complete

jobs:
  budget-gate:
    uses: ./.github/workflows/budget-gate.yml
    with:
      triggering_workflow: release
    secrets:
      BUDGET_HMAC_KEY: ${{ secrets.BUDGET_HMAC_KEY }}
      BUDGET_HMAC_KEY_PREVIOUS: ${{ secrets.BUDGET_HMAC_KEY_PREVIOUS }}
      CLAUDE_MONTHLY_BUDGET_USD: ${{ secrets.CLAUDE_MONTHLY_BUDGET_USD }}

  verify-version:
    name: Verify tag matches plugin manifest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: extract
        name: Extract tag and manifest versions
        run: |
          set -euo pipefail
          # Strip exactly one leading "v" -- "vv0.2.0" must surface as a
          # mismatch, not be silently normalized.
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION="$(jq -r '.version' plugins/autonomous-dev/.claude-plugin/plugin.json)"
          echo "Tag version:      $TAG_VERSION"
          echo "Manifest version: $MANIFEST_VERSION"
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            # Exact text -- downstream operators grep for this string.
            echo "::error::Tag ${GITHUB_REF_NAME} does not match plugin manifest version ${MANIFEST_VERSION}"
            exit 1
          fi
          echo "version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Emit spend estimate
        if: always()
        env:
          BUDGET_HMAC_KEY: ${{ secrets.BUDGET_HMAC_KEY }}
          ESTIMATED_COST_USD: "0.00"   # no Claude calls in this job
          SPEND_WORKFLOW_NAME: release
        run: bash scripts/ci/emit-spend-estimate.sh

      - name: Upload spend artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spend-estimate-${{ github.run_id }}
          path: .github/budget/spend-${{ github.run_id }}.json
          retention-days: 90

  # ----------------------------------------------------------------
  # verify-evals (SPEC-017-3-04)
  # ----------------------------------------------------------------
  # Runs in parallel with verify-version (no `needs:` between them).
  # Does NOT re-run the eval suite -- it trusts the most recent
  # main-branch baseline published by the assist-evals.yml cron.
  # Operator runbook: docs/operators/release-recovery.md
  verify-evals:
    name: Verify assist eval baseline
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      baseline-rate: ${{ steps.baseline.outputs.baseline-rate }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch eval baseline
        id: baseline
        run: bash scripts/ci/fetch-eval-baseline.sh

      - name: Assert baseline meets threshold
        env:
          THRESHOLD: ${{ vars.ASSIST_EVAL_THRESHOLD || '0.85' }}
          BASELINE_RATE: ${{ steps.baseline.outputs.baseline-rate }}
        run: |
          set -euo pipefail
          if [ -z "${BASELINE_RATE:-}" ]; then
            echo "::error::No assist eval baseline found on _eval-baseline branch; release blocked. See docs/operators/release-recovery.md"
            exit 1
          fi
          if awk "BEGIN { exit !($BASELINE_RATE < $THRESHOLD) }"; then
            echo "::error::Assist eval baseline is below $THRESHOLD; release blocked"
            exit 1
          fi
          echo "Baseline $BASELINE_RATE meets threshold $THRESHOLD"

  # ----------------------------------------------------------------
  # generate-changelog (SPEC-017-3-02)
  # ----------------------------------------------------------------
  # Generates a CHANGELOG.md entry via Claude using the commit log
  # between the previous tag and this one. The commit log is passed
  # via `--attach` ONLY -- never interpolated into the prompt string
  # (see release.yml header invariants and SPEC-017-3-02 §Trust-Gate Note).
  #
  # `verify-evals` is added by SPEC-017-3-04; if that spec lands
  # after this one, the `needs:` reference still resolves because
  # both jobs are declared in the same workflow file.
  generate-changelog:
    name: Generate changelog with Claude
    needs: [budget-gate, verify-version, verify-evals]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      changelog-path: ${{ steps.locate.outputs.path }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0     # required for git describe --tags and git log <prev>..HEAD

      - name: Determine previous tag
        id: prev
        run: |
          set -euo pipefail
          PREV_TAG="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo '')"
          echo "previous=$PREV_TAG" >> "$GITHUB_OUTPUT"
          echo "Previous tag: ${PREV_TAG:-<none, first release>}"

      - name: Collect commit log
        run: |
          set -euo pipefail
          if [ -n "${{ steps.prev.outputs.previous }}" ]; then
            git log "${{ steps.prev.outputs.previous }}..${GITHUB_REF_NAME}" \
              --pretty=format:"%h %s" > /tmp/commits.txt
          else
            git log --pretty=format:"%h %s" > /tmp/commits.txt
          fi
          wc -l /tmp/commits.txt

      - name: Trust gate (composite)
        id: trust
        uses: ./.github/actions/claude-trust-gate
        with:
          # Tag pushes have no comment author. Pushing a tag requires
          # `contents: write` (or admin), which by definition means a
          # trusted maintainer. See SPEC-017-3-02 §Trust-Gate Note.
          author-association: OWNER

      - name: Generate changelog with Claude
        if: steps.trust.outputs.is-trusted == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--attach /tmp/commits.txt --max-turns 5"
          prompt: |
            Generate a CHANGELOG.md entry for release ${{ github.ref_name }}.

            The attached file contains every commit in this release as
            "<sha> <subject>" lines.  Use ONLY the attached content; do not
            invent features or guess at scope.  For every line in the
            changelog you produce, include the commit SHA in parentheses,
            e.g. "- Added retry logic for token refresh (a1b2c3d)".

            Output strictly the following Markdown structure (omit any
            section that has no entries):

            ## ${{ github.ref_name }} — $(date -u +%Y-%m-%d)

            ### Added
            ### Changed
            ### Deprecated
            ### Removed
            ### Fixed
            ### Security

            Write the result to /tmp/changelog.md.  Do not write anything else.

      - name: Verify changelog produced
        id: locate
        run: |
          set -euo pipefail
          if [ ! -s /tmp/changelog.md ]; then
            echo "::error::Claude changelog generation produced no output at /tmp/changelog.md"
            exit 1
          fi
          echo "path=/tmp/changelog.md" >> "$GITHUB_OUTPUT"
          echo "Changelog preview:"
          head -40 /tmp/changelog.md

      - name: Emit spend estimate
        if: always()
        env:
          BUDGET_HMAC_KEY: ${{ secrets.BUDGET_HMAC_KEY }}
          ESTIMATED_COST_USD: "0.15"   # changelog generation, --max-turns 5
          SPEND_WORKFLOW_NAME: release
        run: bash scripts/ci/emit-spend-estimate.sh

      - name: Upload spend artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spend-estimate-${{ github.run_id }}-changelog
          path: .github/budget/spend-${{ github.run_id }}.json
          retention-days: 90

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: changelog-${{ github.ref_name }}
          path: /tmp/changelog.md
          retention-days: 90

  # ----------------------------------------------------------------
  # create-release (SPEC-017-3-02)
  # ----------------------------------------------------------------
  # Publishes the GitHub Release using the Claude-generated changelog
  # as the body. `generate_release_notes: false` is critical -- without
  # it, GitHub appends its own auto-changelog and produces a confusing
  # duplicate body.
  create-release:
    name: Publish GitHub Release
    needs: [generate-changelog]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Download changelog
        uses: actions/download-artifact@v4
        with:
          name: changelog-${{ github.ref_name }}
          path: /tmp

      - name: Detect prebuilt artifacts
        id: artifacts
        run: |
          set -euo pipefail
          if [ -d dist ] && [ -n "$(ls -A dist 2>/dev/null)" ]; then
            echo "files=dist/*" >> "$GITHUB_OUTPUT"
          else
            echo "files=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: /tmp/changelog.md
          generate_release_notes: false
          files: ${{ steps.artifacts.outputs.files }}
          fail_on_unmatched_files: false
