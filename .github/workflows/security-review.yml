name: security-review

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC -- weekly trufflehog scan (SPEC-016-4-03)
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # required for SARIF upload (SPEC-016-4-03)
  pull-requests: write     # required for gitleaks PR comments

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks (secret scanning)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # required for gitleaks --redact and historical scanning

      - name: Run gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2.3.7
        with:
          config-path: .github/security/gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "true"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"

      - name: Upload gitleaks SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3.27.0
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

  trufflehog:
    name: trufflehog (verified-only, weekly)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run trufflehog (verified-only)
        id: trufflehog
        uses: trufflesecurity/trufflehog@v3.63.2
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified --json --sarif-output=results.sarif
        continue-on-error: true   # SARIF upload (next step) handles result publishing; gate logic lives in aggregate job

      - name: Upload trufflehog SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3.27.0
        with:
          sarif_file: results.sarif
          category: trufflehog
