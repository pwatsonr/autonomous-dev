# ============================================================
# Portal lint gate — SPEC-034-2-04 (CI integration / merge-blocking).
# ============================================================
# Runs the five portal lint checks on PRs that touch portal CSS,
# styles, or templates. Each check is its own job so failures are
# individually attributable in the GitHub UI (AC-03 of SPEC-034-2-04).
#
# Merge-blocking jobs:
#   - lint-css-tokens          (SPEC-034-2-01, TDD-034 §5.8 / M-01)
#   - lint-box-shadow          (SPEC-034-2-03, TDD-034 §5.5 / R-15a)
#   - lint-no-emoji            (SPEC-034-2-02, TDD-034 §5.6 rule 2 / M-05)
#   - phase-contrast-a-and-c   (PRD-018 M-02 part A + M-06 parity)
#   - phase-contrast-peer-chip (PRD-018 M-02 part B / OI-3403)
#       Was advisory through SPEC-034-2-04. As of the M-02 part-B palette
#       fix, the --phase-* tokens in design-tokens.css now satisfy >=3:1 for
#       all 7 adjacent pairs in both themes (14/14 PASS). This job is now
#       binding — branch protection should add it to required status checks.
#
# Branch protection: an admin must mark all five merge-blocking jobs as
# required status checks for `main` in repo settings (per SPEC-034-2-04
# AC-04).
# ============================================================

name: portal-lint

on:
  pull_request:
    paths:
      - 'plugins/autonomous-dev-portal/static/**/*.css'
      - 'plugins/autonomous-dev-portal/src/styles/**'
      - 'plugins/autonomous-dev-portal/server/templates/**'
      - 'plugins/autonomous-dev-portal/scripts/lint-css-tokens.sh'
      - 'plugins/autonomous-dev-portal/scripts/lint-no-emoji.sh'
      - 'plugins/autonomous-dev-portal/scripts/lint-box-shadow.sh'
      - 'plugins/autonomous-dev-portal/scripts/check-phase-contrast.ts'
      - '.github/workflows/portal-lint.yml'

permissions:
  contents: read

concurrency:
  group: portal-lint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-css-tokens:
    name: Lint CSS tokens (no hex / font / px literals)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run lint-css-tokens.sh
        run: bash plugins/autonomous-dev-portal/scripts/lint-css-tokens.sh

  lint-box-shadow:
    name: Lint box-shadow tokenization
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run lint-box-shadow.sh
        run: bash plugins/autonomous-dev-portal/scripts/lint-box-shadow.sh

  lint-no-emoji:
    name: Lint templates (no Unicode emoji)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run lint-no-emoji.sh
        run: bash plugins/autonomous-dev-portal/scripts/lint-no-emoji.sh

  phase-contrast-a-and-c:
    name: Phase contrast — Part A (WCAG) + Part C (parity)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Run check-phase-contrast.ts (Parts A + C only)
        # Part B is asserted by the phase-contrast-peer-chip job below so
        # individual failures are attributable in the GitHub UI (AC-03 of
        # SPEC-034-2-04). Both jobs are merge-blocking.
        run: bun run plugins/autonomous-dev-portal/scripts/check-phase-contrast.ts --skip-peer-chip

  phase-contrast-peer-chip:
    name: Phase contrast — Part B (peer-chip)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # ----------------------------------------------------------------
    # MERGE-BLOCKING (PRD-018 M-02 part B / OI-3403).
    #
    # As of the M-02 part-B palette fix, the --phase-* tokens in
    # design-tokens.css satisfy >=3:1 adjacent-pair contrast for all 7
    # pipeline transitions in both light and dark themes (14/14 PASS).
    # Regressions to the palette that drop any pair below 3:1 will block
    # merges via this job.
    # ----------------------------------------------------------------
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Run check-phase-contrast.ts (full — including Part B)
        run: bun run plugins/autonomous-dev-portal/scripts/check-phase-contrast.ts
