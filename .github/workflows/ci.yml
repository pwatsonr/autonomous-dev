name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, ready_for_review]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION_MATRIX: "[18, 20]"
  CLAUDE_CLI_VERSION: "latest"

jobs:
  paths-filter:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      typescript: ${{ steps.filter.outputs.typescript }}
      shell: ${{ steps.filter.outputs.shell }}
      markdown: ${{ steps.filter.outputs.markdown }}
      workflows: ${{ steps.filter.outputs.workflows }}
      plugins: ${{ steps.filter.outputs.plugins }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            typescript:
              - 'plugins/autonomous-dev/src/**/*.ts'
              - 'plugins/autonomous-dev/tests/**/*.ts'
              - 'plugins/autonomous-dev/tsconfig*.json'
              - 'plugins/autonomous-dev/package.json'
              - 'plugins/autonomous-dev/package-lock.json'
              - 'plugins/autonomous-dev/.eslintrc.cjs'
              - 'plugins/autonomous-dev/.prettierrc'
            shell:
              - '**/*.sh'
              - '**/*.bash'
              - 'plugins/autonomous-dev/bin/**'
              - 'plugins/autonomous-dev/lib/**/*.sh'
            markdown:
              - '**/*.md'
              - '**/*.markdown'
            workflows:
              - '.github/workflows/**'
              - '.github/actions/**'
            plugins:
              - 'plugins/**/.claude-plugin/plugin.json'
              - 'plugins/**/agents/**'
              - 'plugins/**/commands/**'
              - 'plugins/**/hooks/**'

  typecheck:
    name: Typecheck (${{ matrix.os }}, Node ${{ matrix.node-version }})
    needs: paths-filter
    if: needs.paths-filter.outputs.typescript == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [18, 20]
    defaults:
      run:
        working-directory: plugins/autonomous-dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'plugins/autonomous-dev/package-lock.json'

      - name: Restore tsbuildinfo cache
        uses: actions/cache@v4
        with:
          path: plugins/autonomous-dev/tsconfig.tsbuildinfo
          key: tsbuildinfo-${{ runner.os }}-node${{ matrix.node-version }}-${{ hashFiles('plugins/autonomous-dev/src/**/*.ts', 'plugins/autonomous-dev/tsconfig*.json') }}
          restore-keys: |
            tsbuildinfo-${{ runner.os }}-node${{ matrix.node-version }}-

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit --incremental

  lint:
    name: Lint (ESLint + Prettier)
    needs: paths-filter
    if: needs.paths-filter.outputs.typescript == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/autonomous-dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'plugins/autonomous-dev/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint src/ tests/ --ext .ts --format github

      - name: Prettier
        run: npx prettier --check 'src/**/*.ts' 'tests/**/*.ts' 'package.json' 'tsconfig*.json' --log-level warn

  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node-version }})
    needs: paths-filter
    if: needs.paths-filter.outputs.typescript == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [18, 20]
    defaults:
      run:
        working-directory: plugins/autonomous-dev
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'plugins/autonomous-dev/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run Jest with coverage
        run: npm test -- --coverage --coverageReporters=text-lcov --coverageReporters=html

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            plugins/autonomous-dev/coverage/lcov.info
            plugins/autonomous-dev/coverage/lcov-report/
          retention-days: 30
          if-no-files-found: error
