name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, ready_for_review]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION_MATRIX: "[18, 20]"
  CLAUDE_CLI_VERSION: "latest"

jobs:
  paths-filter:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      typescript: ${{ steps.filter.outputs.typescript }}
      shell: ${{ steps.filter.outputs.shell }}
      markdown: ${{ steps.filter.outputs.markdown }}
      workflows: ${{ steps.filter.outputs.workflows }}
      plugins: ${{ steps.filter.outputs.plugins }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            typescript:
              - 'plugins/autonomous-dev/src/**/*.ts'
              - 'plugins/autonomous-dev/tests/**/*.ts'
              - 'plugins/autonomous-dev/tsconfig*.json'
              - 'plugins/autonomous-dev/package.json'
              - 'plugins/autonomous-dev/package-lock.json'
              - 'plugins/autonomous-dev/.eslintrc.cjs'
              - 'plugins/autonomous-dev/.prettierrc'
            shell:
              - '**/*.sh'
              - '**/*.bash'
              - 'plugins/autonomous-dev/bin/**'
              - 'plugins/autonomous-dev/lib/**/*.sh'
            markdown:
              - '**/*.md'
              - '**/*.markdown'
            workflows:
              - '.github/workflows/**'
              - '.github/actions/**'
            plugins:
              - 'plugins/**/.claude-plugin/plugin.json'
              - 'plugins/**/agents/**'
              - 'plugins/**/commands/**'
              - 'plugins/**/hooks/**'

  shell:
    name: shell
    needs: paths-filter
    if: needs.paths-filter.outputs.shell == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run shellcheck against bin/*.sh
        run: |
          set -euo pipefail
          find plugins/autonomous-dev/bin -maxdepth 1 -type f -name '*.sh' \
            -exec shellcheck {} \;

      - name: Run shellcheck against installers/*.sh
        run: |
          set -euo pipefail
          find plugins/autonomous-dev/installers -maxdepth 1 -type f -name '*.sh' \
            -exec shellcheck {} \;

  markdown:
    name: markdown
    needs: paths-filter
    if: needs.paths-filter.outputs.markdown == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Link check
        uses: lycheeverse/lychee-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >-
            --verbose
            --cache
            --max-cache-age 1d
            --config lychee.toml
            "plugins/**/docs/**/*.md"
            "README.md"
          fail: true

  actionlint:
    name: actionlint
    needs: paths-filter
    if: needs.paths-filter.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint workflows
        uses: rhysd/actionlint@v1
        with:
          fail-on-error: true

  typecheck:
    name: Typecheck (${{ matrix.os }}, Node ${{ matrix.node-version }})
    needs: paths-filter
    if: needs.paths-filter.outputs.typescript == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [18, 20]
    defaults:
      run:
        working-directory: plugins/autonomous-dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'plugins/autonomous-dev/package-lock.json'

      - name: Restore tsbuildinfo cache
        uses: actions/cache@v4
        with:
          path: plugins/autonomous-dev/tsconfig.tsbuildinfo
          key: tsbuildinfo-${{ runner.os }}-node${{ matrix.node-version }}-${{ hashFiles('plugins/autonomous-dev/src/**/*.ts', 'plugins/autonomous-dev/tsconfig*.json') }}
          restore-keys: |
            tsbuildinfo-${{ runner.os }}-node${{ matrix.node-version }}-

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit --incremental

  lint:
    name: Lint (ESLint + Prettier)
    needs: paths-filter
    if: needs.paths-filter.outputs.typescript == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/autonomous-dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'plugins/autonomous-dev/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint src/ tests/ --ext .ts --format github

      - name: Prettier
        run: npx prettier --check 'src/**/*.ts' 'tests/**/*.ts' 'package.json' 'tsconfig*.json' --log-level warn

  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node-version }})
    needs: paths-filter
    if: needs.paths-filter.outputs.typescript == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [18, 20]
    defaults:
      run:
        working-directory: plugins/autonomous-dev
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'plugins/autonomous-dev/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run Jest with coverage
        run: npm test -- --coverage --coverageReporters=text-lcov --coverageReporters=html

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            plugins/autonomous-dev/coverage/lcov.info
            plugins/autonomous-dev/coverage/lcov-report/
          retention-days: 30
          if-no-files-found: error

  plugin-validate:
    name: plugin-validate
    needs: paths-filter
    if: needs.paths-filter.outputs.plugins == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # required for version-monotonicity step (SPEC-016-3-03)

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bootstrap Claude CLI
        id: claude-bootstrap
        continue-on-error: true
        run: |
          set -e
          npm install -g "${{ env.CLAUDE_CLI_VERSION }}"
          claude --version
          echo "bootstrap-success=true" >> "$GITHUB_OUTPUT"

      - name: Validate plugin manifests (Claude CLI)
        if: steps.claude-bootstrap.outputs.bootstrap-success == 'true'
        run: |
          set -euo pipefail
          shopt -s nullglob
          manifests=(plugins/*/.claude-plugin/plugin.json)
          if [ ${#manifests[@]} -eq 0 ]; then
            echo "::error::No plugin manifests found at plugins/*/.claude-plugin/plugin.json"
            exit 1
          fi
          echo "Validating ${#manifests[@]} manifest(s) with Claude CLI..."
          for manifest in "${manifests[@]}"; do
            echo "::group::claude plugin validate ${manifest}"
            claude plugin validate "${manifest}"
            echo "::endgroup::"
          done

      - name: Validate plugin manifests (ajv-cli fallback)
        if: steps.claude-bootstrap.outputs.bootstrap-success != 'true'
        run: |
          set -euo pipefail
          echo "::warning::Claude CLI bootstrap failed, falling back to JSON schema validation"
          shopt -s nullglob
          manifests=(plugins/*/.claude-plugin/plugin.json)
          if [ ${#manifests[@]} -eq 0 ]; then
            echo "::error::No plugin manifests found at plugins/*/.claude-plugin/plugin.json"
            exit 1
          fi
          npx --yes ajv-cli@8 validate \
            --spec=draft2020 \
            --strict=true \
            -s .github/schemas/plugin.schema.json \
            -d "plugins/*/.claude-plugin/plugin.json"

      - name: Verify plugin version monotonicity (release/tag refs only)
        if: startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          npm install --no-save --no-audit --no-fund semver@7
          node -e '
            const fs = require("fs");
            const path = require("path");
            const cp = require("child_process");
            const semver = require("semver");
            let lastTag = "";
            try {
              lastTag = cp.execSync(
                "git describe --tags --abbrev=0 --match=v*",
                { stdio: ["ignore", "pipe", "ignore"] }
              ).toString().trim();
            } catch (_) { lastTag = ""; }
            const lastVersion = lastTag ? lastTag.replace(/^v/, "") : "0.0.0";
            if (!semver.valid(lastVersion)) {
              console.error(`::error::Last tag "${lastTag}" is not valid semver`);
              process.exit(1);
            }
            const manifests = fs.readdirSync("plugins", { withFileTypes: true })
              .filter((d) => d.isDirectory())
              .map((d) => path.join("plugins", d.name, ".claude-plugin", "plugin.json"))
              .filter((p) => fs.existsSync(p));
            if (manifests.length === 0) {
              console.error("::error::No plugin manifests found");
              process.exit(1);
            }
            let failed = false;
            for (const file of manifests) {
              const m = JSON.parse(fs.readFileSync(file, "utf8"));
              const v = m.version;
              if (!semver.valid(v)) {
                console.error(`::error file=${file}::Manifest version "${v}" is not valid semver`);
                failed = true;
                continue;
              }
              if (!semver.gt(v, lastVersion)) {
                console.error(
                  `::error file=${file}::Plugin "${m.name}" version ${v} is not strictly greater than last tag ${lastVersion}`
                );
                failed = true;
                continue;
              }
              console.log(`OK: ${m.name} ${v} > ${lastVersion}`);
            }
            if (failed) process.exit(1);
          '
