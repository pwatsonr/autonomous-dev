# help-questions.yaml -- Test cases for the help skill
# 30+ cases across: what-is, command-syntax, concept-explanation, comparison, edge-case

suite: help
skill: help
description: >
  Validates that the help skill returns accurate, complete answers to user
  questions about autonomous-dev commands, concepts, agents, and workflows.

# ============================================================================
# Category 1: Basic "what is" questions (6 cases)
# ============================================================================
cases:

  - id: help-what-001
    category: what-is
    difficulty: easy
    question: "What is autonomous-dev?"
    expected_topics:
      - daemon
      - autonomous development
      - pipeline
      - phases
    must_mention:
      - "autonomous-dev"
      - "daemon"
    must_not_mention:
      - "deprecated"

  - id: help-what-002
    category: what-is
    difficulty: easy
    question: "What is the kill switch in autonomous-dev?"
    expected_topics:
      - emergency stop
      - halt processing
      - safety mechanism
    must_mention:
      - "kill-switch"
      - "autonomous-dev kill-switch"
    must_not_mention:
      - "circuit-breaker"  # different mechanism

  - id: help-what-003
    category: what-is
    difficulty: easy
    question: "What is the circuit breaker?"
    expected_topics:
      - consecutive crashes
      - automatic halt
      - threshold
      - reset
    must_mention:
      - "circuit-breaker"
      - "crash"
    must_not_mention: []

  - id: help-what-004
    category: what-is
    difficulty: easy
    question: "What is the review gate?"
    expected_topics:
      - quality check
      - document review
      - scoring
      - rubric
    must_mention:
      - "review"
      - "rubric"
    must_not_mention: []

  - id: help-what-005
    category: what-is
    difficulty: easy
    question: "What is the agent factory?"
    expected_topics:
      - agent creation
      - registry
      - domain matching
      - observation
    must_mention:
      - "agent"
      - "factory"
    must_not_mention: []

  - id: help-what-006
    category: what-is
    difficulty: easy
    question: "What is the production intelligence loop?"
    expected_topics:
      - observation
      - metrics collection
      - Prometheus
      - anomaly detection
    must_mention:
      - "observe"
      - "intelligence"
    must_not_mention: []

# ============================================================================
# Category 2: Command syntax questions (10 cases)
# ============================================================================

  - id: help-cmd-001
    category: command-syntax
    difficulty: easy
    question: "How do I start the autonomous-dev daemon?"
    expected_topics:
      - daemon start command
      - OS service
    must_mention:
      - "autonomous-dev daemon start"
    must_not_mention:
      - "systemctl start autonomous-dev"  # incomplete -- needs --user

  - id: help-cmd-002
    category: command-syntax
    difficulty: easy
    question: "How do I check the daemon status?"
    expected_topics:
      - daemon status command
      - kill switch state
      - circuit breaker state
      - heartbeat
    must_mention:
      - "autonomous-dev daemon status"
    must_not_mention: []

  - id: help-cmd-003
    category: command-syntax
    difficulty: easy
    question: "How do I install the daemon?"
    expected_topics:
      - install-daemon command
      - OS service registration
    must_mention:
      - "autonomous-dev install-daemon"
    must_not_mention: []

  - id: help-cmd-004
    category: command-syntax
    difficulty: medium
    question: "How do I engage the kill switch?"
    expected_topics:
      - kill-switch command
      - effect on daemon
      - how to resume
    must_mention:
      - "autonomous-dev kill-switch"
      - "autonomous-dev kill-switch reset"
    must_not_mention: []

  - id: help-cmd-005
    category: command-syntax
    difficulty: medium
    question: "How do I reset the circuit breaker?"
    expected_topics:
      - circuit-breaker reset command
      - crash state file
    must_mention:
      - "autonomous-dev circuit-breaker reset"
    must_not_mention: []

  - id: help-cmd-006
    category: command-syntax
    difficulty: easy
    question: "How do I see my costs?"
    expected_topics:
      - cost command
      - daily breakdown
      - monthly breakdown
    must_mention:
      - "autonomous-dev cost"
    must_not_mention: []

  - id: help-cmd-007
    category: command-syntax
    difficulty: medium
    question: "How do I get costs for a specific request?"
    expected_topics:
      - request flag
      - request ID format
      - per-phase breakdown
    must_mention:
      - "--request"
      - "REQ-"
    must_not_mention: []

  - id: help-cmd-008
    category: command-syntax
    difficulty: medium
    question: "How do I validate my configuration?"
    expected_topics:
      - config validate command
      - validation checks
    must_mention:
      - "autonomous-dev config validate"
    must_not_mention: []

  - id: help-cmd-009
    category: command-syntax
    difficulty: easy
    question: "How do I initialize the configuration?"
    expected_topics:
      - config init command
      - defaults file
    must_mention:
      - "autonomous-dev config init"
    must_not_mention: []

  - id: help-cmd-010
    category: command-syntax
    difficulty: medium
    question: "How do I run the observation cycle for a single service?"
    expected_topics:
      - observe command
      - scope parameter
      - service name
    must_mention:
      - "observe"
      - "scope="
    must_not_mention: []

