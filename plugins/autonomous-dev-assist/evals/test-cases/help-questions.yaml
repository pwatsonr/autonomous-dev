# ============================================================================
# Category 4: Comparison questions (5 cases)
# ============================================================================

  - id: help-compare-001
    category: comparison
    difficulty: medium
    question: "What is the difference between the kill switch and the circuit breaker?"
    expected_topics:
      - manual vs automatic
      - kill switch is human-initiated
      - circuit breaker is crash-triggered
      - both halt processing
    must_mention:
      - "kill-switch"
      - "circuit-breaker"
    must_not_mention: []

  - id: help-compare-002
    category: comparison
    difficulty: medium
    question: "What is the difference between a plan and a spec?"
    expected_topics:
      - plan is higher level
      - spec is detailed implementation
      - plan comes before spec
    must_mention:
      - "plan"
      - "spec"
    must_not_mention: []

  - id: help-compare-003
    category: comparison
    difficulty: hard
    question: "What is the difference between daily and monthly cost caps?"
    expected_topics:
      - daily cap scope
      - monthly cap scope
      - both enforced by cost governor
      - default values
    must_mention:
      - "daily_cost_cap_usd"
      - "monthly_cost_cap_usd"
    must_not_mention: []

  - id: help-compare-004
    category: comparison
    difficulty: medium
    question: "What is the difference between the prd-author and tdd-author agents?"
    expected_topics:
      - PRD focuses on product requirements
      - TDD focuses on technical design
      - different phases
    must_mention:
      - "prd-author"
      - "tdd-author"
    must_not_mention: []

  - id: help-compare-005
    category: comparison
    difficulty: hard
    question: "What is the difference between the doc-reviewer and quality-reviewer agents?"
    expected_topics:
      - doc-reviewer reviews documents
      - quality-reviewer reviews code quality
      - different review scopes
    must_mention:
      - "doc-reviewer"
      - "quality-reviewer"
    must_not_mention: []

# ============================================================================
# Category 5: Edge case questions (6 cases)
# ============================================================================

  - id: help-edge-001
    category: edge-case
    difficulty: hard
    question: "What happens if the daemon crashes mid-phase?"
    expected_topics:
      - crash state tracking
      - circuit breaker
      - retry logic
      - error backoff
    must_mention:
      - "circuit_breaker_threshold"
      - "max_retries_per_phase"
    must_not_mention: []

  - id: help-edge-002
    category: edge-case
    difficulty: hard
    question: "What happens if I exceed the daily cost cap?"
    expected_topics:
      - processing halts
      - cost governor enforcement
      - resumes next day
    must_mention:
      - "daily_cost_cap_usd"
      - "cost"
    must_not_mention: []

  - id: help-edge-003
    category: edge-case
    difficulty: hard
    question: "What happens if the lock file is stale?"
    expected_topics:
      - stale lock detection
      - PID check
      - daemon.lock
    must_mention:
      - "lock"
      - "PID"
    must_not_mention: []

  - id: help-edge-004
    category: edge-case
    difficulty: medium
    question: "Can I run autonomous-dev on an unsupported OS?"
    expected_topics:
      - macOS and Linux supported
      - error on unsupported OS
    must_mention:
      - "macOS"
      - "Linux"
    must_not_mention: []

  - id: help-edge-005
    category: edge-case
    difficulty: hard
    question: "What happens if all MCP sources are unreachable during an observation run?"
    expected_topics:
      - run aborts
      - critical log entry
      - partial data handling
    must_mention:
      - "MCP"
      - "abort"
    must_not_mention: []

  - id: help-edge-006
    category: edge-case
    difficulty: hard
    question: "What happens when the review gate reviewers disagree?"
    expected_topics:
      - disagreement detection
      - convergence tracking
      - score aggregation
      - potential escalation
    must_mention:
      - "disagree"
      - "convergence"
    must_not_mention: []
