  # ---- troubleshoot-scenario (7 cases; cost-cap + ledger-corruption; -001..-007) ----
  - id: deploy-troubleshoot-scenario-001
    category: troubleshoot-scenario
    difficulty: medium
    question: "I hit cost-cap-tripped -- what now?"
    expected_topics:
      - "ledger reset"
      - "deploy ledger reset"
      - "do NOT edit"
    must_mention:
      - "ledger reset"
    must_not_mention:
      - "deploy force-approve"
      - "edit.*ledger\\.json"

  - id: deploy-troubleshoot-scenario-002
    category: troubleshoot-scenario
    difficulty: medium
    question: "The cost cap is too low for my deploy -- can I bypass it?"
    expected_topics:
      - "raise the cap"
      - "deploy.yaml"
      - "review"
    must_mention:
      - "raise the cap in deploy.yaml"
    must_not_mention:
      - "deploy force-approve"
      - "edit.*ledger\\.json"
      - "deploy auto-prod"
      - "cost cap.*ignore"
      - "deploy.*--no-approval"
      - "ignore"

