  # eval-case-v1 enum: backends->command-syntax, plan-approve->command-syntax,
  # cost-cap->troubleshoot-scenario, ledger-corruption->troubleshoot-scenario,
  # healthmonitor->concept-explanation, sla->concept-explanation,
  # prod-approval->warning. Case ids renumbered to schema regex.

