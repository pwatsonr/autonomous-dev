apiVersion: apps/v1
kind: Deployment
metadata:
  name: rogue
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rogue
  template:
    metadata:
      labels:
        app: rogue
    spec:
      containers:
        - name: rogue
          image: registry.example.com/rogue:1
